name: lestar_user
description: "A new Flutter project."
# The following line prevents the package from being accidentally published to
# pub.dev using `flutter pub publish`. This is preferred for private packages.
publish_to: "none" # Remove this line if you wish to publish to pub.dev

# The following defines the version and build number for your application.
# A version number is three numbers separated by dots, like 1.2.43
# followed by an optional build number separated by a +.
# Both the version and the builder number may be overridden in flutter
# build by specifying --build-name and --build-number, respectively.
# In Android, build-name is used as versionName while build-number used as versionCode.
# Read more about Android versioning at https://developer.android.com/studio/publish/versioning
# In iOS, build-name is used as CFBundleShortVersionString while build-number is used as CFBundleVersion.
# Read more about iOS versioning at
# https://developer.apple.com/library/archive/documentation/General/Reference/InfoPlistKeyReference/Articles/CoreFoundationKeys.html
# In Windows, build-name is used as the major, minor, and patch parts
# of the product and file versions while build-number is used as the build suffix.
version: 1.0.1+2

environment:
  sdk: ^3.11.0-244.0.dev

# Dependencies specify other packages that your package needs in order to work.
# To automatically upgrade your package dependencies to the latest versions
# consider running `flutter pub upgrade --major-versions`. Alternatively,
# dependencies can be manually updated by changing the version numbers below to
# the latest version available on pub.dev. To see which dependencies have newer
# versions available, run `flutter pub outdated`.
dependencies:
  animated_flip_counter: ^0.3.4
  cached_network_image: ^3.4.1
  card_swiper: ^3.0.1
  carousel_slider: ^5.0.0
  chewie: ^1.11.0
  connectivity_plus: ^6.0.5
  country_code_picker: ^3.0.0
  cupertino_icons: ^1.0.8
  custom_info_window: ^1.0.1
  custom_map_markers: ^0.0.2+1
  dotted_border: ^2.1.0
  drift: ^2.21.0
  drift_flutter: ^0.2.1
  expandable_bottom_sheet: ^1.1.1+1
  file_picker: ^8.1.2
  firebase_auth: ^5.3.1
  firebase_core: ^3.8.0
  firebase_messaging: ^15.1.5
  flutter:
    sdk: flutter
  flutter_facebook_auth: ^6.0.4
  flutter_inappwebview: ^6.1.4
  flutter_launcher_icons: ^0.14.4
  flutter_local_notifications: ^17.2.3
  flutter_localizations:
    sdk: flutter
  flutter_slidable: ^3.1.2
  flutter_svg: ^2.0.10+1
  flutter_widget_from_html_core: ^0.15.2
  geolocator: ^13.0.1
  get: ^4.6.6
  get_thumbnail_video: ^0.7.3
  google_maps_flutter: ^2.9.0
  google_maps_flutter_web: ^0.5.10
  google_sign_in: ^6.2.1
  google_sign_in_web: ^0.12.4+2
  http: ^1.2.2
  http_parser: ^4.1.0
  image_picker: ^1.1.2
  intl: ^0.20.2
  just_the_tooltip: ^0.0.12
  location: ^7.0.0
  marquee: ^2.2.3
  meta_seo: ^3.0.9
  path: ^1.9.0
  path_provider: ^2.1.4
  permission_handler: ^11.3.1
  phone_numbers_parser: ^9.0.1
  photo_view: ^0.15.0
  pin_code_fields: ^8.0.1
  pointer_interceptor: ^0.10.1+2
  share_plus: ^10.0.2
  shared_preferences: ^2.3.4
  shimmer_animation: ^2.2.1
  sign_in_with_apple: ^6.1.1
  smooth_page_indicator: ^1.2.0+3
  syncfusion_flutter_datepicker: ^30.1.39
  universal_html: ^2.2.4
  url_launcher: ^6.3.0
  url_strategy: ^0.3.0
  video_player: ^2.9.3
#  postgres: ^3.4.3
#  drift_postgres: ^1.3.0
dev_dependencies:
  build_runner: ^2.4.13
  drift_dev: ^2.21.2

  flutter_lints: ^5.0.0
  flutter_test:
    sdk: flutter
flutter_launcher_icons:
  android: "ic_launcher"
  ios: true
  image_path: "assets/image/logo.png"
  min_sdk_android: 21 # android min sdk min:16, default 21
  web:
    generate: true
    image_path: "assets/image/logo.png"
    background_color: "#hexcode"
    theme_color: "#hexcode"
dependency_overrides:
  fading_edge_scrollview: ^4.1.1
  collection: ^1.19.0
  web: ^1.1.0

flutter:
  uses-material-design: true

  assets:
    - assets/image/
    - assets/language/
    - assets/map/

  fonts:
    - family: Roboto
      fonts:
        - asset: assets/font/Roboto-Regular.ttf
          weight: 400
        - asset: assets/font/Roboto-Medium.ttf
          weight: 500
        - asset: assets/font/Roboto-Bold.ttf
          weight: 700
        - asset: assets/font/Roboto-Black.ttf
          weight: 900
